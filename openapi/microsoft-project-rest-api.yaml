components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication via Azure AD for SharePoint Online
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          tokenUrl: https://login.microsoftonline.com/common/oauth2/token
          scopes:
            ProjectServer.Read: Read Project Server data
            ProjectServer.ReadWrite: Read and write Project Server data
  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      description: The GUID identifier of the project
      schema:
        type: string
        format: uuid
      example: 263fc8d7-427c-e111-92fc-00155d3ba208
    taskId:
      name: taskId
      in: path
      required: true
      description: The GUID identifier of the task
      schema:
        type: string
        format: uuid
      example: b1c2d3e4-f5a6-7890-abcd-ef1234567890
    resourceId:
      name: resourceId
      in: path
      required: true
      description: The GUID identifier of the enterprise resource
      schema:
        type: string
        format: uuid
      example: 28eeb2b5-fe74-4efc-aa35-6a64514d1526
    assignmentId:
      name: assignmentId
      in: path
      required: true
      description: The GUID identifier of the assignment
      schema:
        type: string
        format: uuid
      example: a2eafeb5-437c-e111-92fc-00155d3ba208
    calendarId:
      name: calendarId
      in: path
      required: true
      description: The GUID identifier of the calendar
      schema:
        type: string
        format: uuid
    fieldId:
      name: fieldId
      in: path
      required: true
      description: The GUID identifier of the custom field
      schema:
        type: string
        format: uuid
    tableId:
      name: tableId
      in: path
      required: true
      description: The GUID identifier of the lookup table
      schema:
        type: string
        format: uuid
    periodId:
      name: periodId
      in: path
      required: true
      description: The GUID identifier of the timesheet period
      schema:
        type: string
        format: uuid
    phaseId:
      name: phaseId
      in: path
      required: true
      description: The GUID identifier of the phase
      schema:
        type: string
        format: uuid
    stageId:
      name: stageId
      in: path
      required: true
      description: The GUID identifier of the stage
      schema:
        type: string
        format: uuid
    projectTypeId:
      name: projectTypeId
      in: path
      required: true
      description: The GUID identifier of the enterprise project type
      schema:
        type: string
        format: uuid
    handlerId:
      name: handlerId
      in: path
      required: true
      description: The GUID identifier of the event handler
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
              example: InvalidRequest
            message:
              type: string
              description: Error message
              example: The specified project was not found.
    Project:
      type: object
      properties:
        Id:
          type: string
          format: uuid
          description: Unique identifier of the project
          example: 263fc8d7-427c-e111-92fc-00155d3ba208
        Name:
          type: string
          description: Name of the project
          example: Enterprise Website Redesign
        Description:
          type: string
          description: Description of the project
          example: Complete redesign of the corporate website
        StartDate:
          type: string
          format: date-time
          description: Project start date
          example: '2026-01-15T00:00:00Z'
        FinishDate:
          type: string
          format: date-time
          description: Project finish date
          example: '2026-06-30T00:00:00Z'
        CreatedDate:
          type: string
          format: date-time
          description: Date the project was created
          example: '2026-01-10T14:30:00Z'
        ModifiedDate:
          type: string
          format: date-time
          description: Date the project was last modified
          example: '2026-04-18T09:15:00Z'
        IsCheckedOut:
          type: boolean
          description: Whether the project is currently checked out
          example: false
        CheckedOutBy:
          type: string
          description: User who checked out the project
          example: jsmith@contoso.com
        PercentComplete:
          type: integer
          description: Overall completion percentage
          example: 45
        ProjectType:
          type: integer
          description: Enterprise project type identifier
          example: 0
        ProjectSiteUrl:
          type: string
          format: uri
          description: URL to the project site
          example: https://contoso.sharepoint.com/sites/pwa/ProjectSite
    ProjectCreate:
      type: object
      required:
        - Name
      properties:
        Name:
          type: string
          description: Name of the project
          example: New Product Launch
        Description:
          type: string
          description: Description of the project
          example: Launch plan for Q3 product release
        StartDate:
          type: string
          format: date-time
          description: Project start date
          example: '2026-07-01T00:00:00Z'
    ProjectCollection:
      type: object
