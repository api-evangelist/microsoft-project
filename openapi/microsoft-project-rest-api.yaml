      description: Check in a project draft. Optionally force check-in.
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/projectId'
        - name: force
          in: query
          description: Whether to force check-in
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Project checked in
