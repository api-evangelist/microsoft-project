naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Project Management"
  description: "Unified project management workflow combining the Microsoft Project Online REST API for managing projects, tasks, resources, assignments, timesheets, and workflows. Used by project managers, resource managers, and PMO teams."
  tags:
    - Microsoft Project
    - Project Management
    - Resource Management
    - Task Management
    - Timesheets
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SHAREPOINT_ACCESS_TOKEN: SHAREPOINT_ACCESS_TOKEN

capability:
  consumes:
    - import: project-rest
      location: ./shared/project-rest-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: project-management-api
      description: "Unified REST API for Microsoft Project management workflows."
      resources:
        - path: /v1/projects
          name: projects
          description: "Project lifecycle management"
          operations:
            - method: GET
              name: list-projects
              description: "List all projects"
              call: "project-rest.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-project
              description: "Create a new project"
              call: "project-rest.create-project"
              with:
                name: "rest.name"
                description: "rest.description"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects/{projectId}
          name: project-detail
          description: "Single project operations"
          operations:
            - method: GET
              name: get-project
              description: "Get project details"
              call: "project-rest.get-project"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-project
              description: "Delete a project"
              call: "project-rest.delete-project"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects/{projectId}/tasks
          name: tasks
          description: "Task management for a project"
          operations:
            - method: GET
              name: list-tasks
              description: "List all tasks in a project"
              call: "project-rest.list-tasks"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects/{projectId}/assignments
          name: assignments
          description: "Assignment management for a project"
          operations:
            - method: GET
              name: list-assignments
              description: "List all assignments in a project"
              call: "project-rest.list-assignments"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/resources
          name: resources
          description: "Enterprise resource management"
          operations:
            - method: GET
              name: list-resources
              description: "List enterprise resources"
              call: "project-rest.list-enterprise-resources"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/calendars
          name: calendars
          description: "Calendar management"
          operations:
            - method: GET
              name: list-calendars
              description: "List enterprise calendars"
              call: "project-rest.list-calendars"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/timesheets
          name: timesheets
          description: "Timesheet management"
          operations:
            - method: GET
              name: list-timesheet-periods
              description: "List timesheet periods"
              call: "project-rest.list-timesheet-periods"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: project-management-mcp
      transport: http
      description: "MCP server for AI-assisted Microsoft Project management."
      tools:
        - name: list-projects
          description: "List all Microsoft Project Online projects"
          hints:
            readOnly: true
            openWorld: true
          call: "project-rest.list-projects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-project
          description: "Get details of a specific project by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "project-rest.get-project"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-project
          description: "Create a new project with name and description"
          hints:
            readOnly: false
          call: "project-rest.create-project"
          with:
            name: "tools.name"
            description: "tools.description"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-project
          description: "Delete a project by ID"
          hints:
            readOnly: false
            destructive: true
          call: "project-rest.delete-project"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: check-out-project
          description: "Check out a project for editing"
          hints:
            readOnly: false
          call: "project-rest.check-out-project"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: publish-project
          description: "Publish a project draft to make changes visible"
          hints:
            readOnly: false
          call: "project-rest.publish-project"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tasks
          description: "List all tasks in a project"
          hints:
            readOnly: true
            idempotent: true
          call: "project-rest.list-tasks"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-task
          description: "Get a specific task from a project"
          hints:
            readOnly: true
            idempotent: true
          call: "project-rest.get-task"
          with:
            projectId: "tools.projectId"
            taskId: "tools.taskId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-draft-task
          description: "Create a new task in a project draft"
          hints:
            readOnly: false
          call: "project-rest.create-draft-task"
          with:
            projectId: "tools.projectId"
            name: "tools.name"
            duration: "tools.duration"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-enterprise-resources
          description: "List all enterprise resources across projects"
          hints:
            readOnly: true
            openWorld: true
          call: "project-rest.list-enterprise-resources"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-enterprise-resource
          description: "Create a new enterprise resource"
          hints:
            readOnly: false
          call: "project-rest.create-enterprise-resource"
          with:
            name: "tools.name"
            email: "tools.email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-assignments
          description: "List all resource assignments in a project"
          hints:
            readOnly: true
            idempotent: true
          call: "project-rest.list-assignments"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-calendars
          description: "List all enterprise calendars"
          hints:
            readOnly: true
          call: "project-rest.list-calendars"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-custom-fields
          description: "List all enterprise custom field definitions"
          hints:
            readOnly: true
          call: "project-rest.list-custom-fields"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-timesheet-periods
          description: "List all timesheet periods"
          hints:
            readOnly: true
          call: "project-rest.list-timesheet-periods"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-phases
          description: "List all workflow phases"
          hints:
            readOnly: true
          call: "project-rest.list-phases"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-stages
          description: "List all workflow stages"
          hints:
            readOnly: true
          call: "project-rest.list-stages"
          outputParameters:
            - type: object
              mapping: "$."
