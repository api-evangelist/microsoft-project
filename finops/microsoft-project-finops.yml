meters:
  - name: planner_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - tenant
      - assigned_user
  - name: plan1_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - tenant
      - assigned_user
  - name: plan3_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - tenant
      - assigned_user
  - name: standard_2024_licenses
    unit: license
    aggregation: count
    dimensions:
      - tenant
  - name: professional_2024_licenses
    unit: license
    aggregation: count
    dimensions:
      - tenant
  - name: power_platform_requests
    unit: request
    aggregation: sum
    dimensions:
      - user
      - environment
principles:
  - name: Visibility
    description: Use the Microsoft 365 admin center license-usage report and the Power Platform admin
      center capacity reports to expose per-tenant seat consumption and Power Platform request usage
      over time.
  - name: Allocation
    description: Allocate Plan 1 / Plan 3 seats by Microsoft 365 license group; tag each Project
      Online tenant with cost-center metadata to roll up to PMO budget owners.
  - name: Optimization
    description: Right-size between Planner-included, Plan 1 ($10), and Plan 3 ($30) per actual usage;
      avoid blanket Plan 3 assignment for users who only need Planner. Reserve on-prem one-time licenses
      for users who never need cloud collaboration. Plan migration off Plan 5 before 2026-05-01 EOS.
  - name: Accountability
    description: Review monthly Plan 3 utilization against checked-in projects; reclaim seats from
      inactive users; enforce a finance approval step on >100-seat additions.
