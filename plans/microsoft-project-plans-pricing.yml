specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Project
providerId: microsoft-project
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Project Management
  - Portfolio Management
  - Microsoft
  - Scheduling
  - Resource Management
description: Microsoft Project (under the new Microsoft Planner brand) is sold as per-user/month
  subscriptions across three cloud tiers (Planner included with M365, Planner Plan 1 at $10/user/month,
  and Planner and Project Plan 3 at $30/user/month) plus one-time on-prem licenses (Project Standard
  2024 and Project Professional 2024). Project Plan 5 reaches End of Sale on 2026-05-01. API access (REST,
  CSOM, OData reporting, JavaScript) ships with Project Online / Plan 3 entitlements; Power Platform
  request limits apply via the Microsoft 365 license category (typically 6,000 requests / 24hr per user).
sources:
  - https://www.microsoft.com/en-us/microsoft-365/project/compare-microsoft-project-management-software
  - https://learn.microsoft.com/en-us/power-platform/admin/api-request-limits-allocations
plans:
  - id: microsoft-project-planner-included
    name: Microsoft Planner (included with Microsoft 365)
    type: freemium
    description: Basic Planner experience bundled with eligible Microsoft 365 subscriptions.
    entries:
      - label: Per-user license
        name: planner_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Power Platform requests
        name: ppr
        type: quota
        metric: requests
        limit: 6000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Real-time collaboration
      - name: Task management
      - name: Basic templates
      - name: Grid / Board / Schedule / Charts views
      - name: Task dependencies
      - name: Security and compliance
  - id: microsoft-project-planner-plan-1
    name: Planner Plan 1
    type: subscription
    description: Per-user Planner Plan 1 subscription.
    entries:
      - label: Per-user license
        name: plan1_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '10.00'
        userMultiplied: true
      - label: Power Platform requests
        name: ppr
        type: quota
        metric: requests
        limit: 6000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Files, checklists and labels on tasks
