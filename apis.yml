  - aid: microsoft-project:odata-reporting-api
    name: Microsoft Project OData Reporting API
    description: >-
      OData-based reporting feed for read-only access to Project Server and
      Project Online reporting data. Provides access to project, task, resource,
      assignment, and timesheet reporting tables and views via the ProjectData
      service endpoint.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
