aid: microsoft-project
name: Microsoft Project
description: >-
  Microsoft Project is a project management software product developed by
  Microsoft. It provides tools for developing plans, assigning resources to
  tasks, tracking progress, managing budgets, and analyzing workloads. Microsoft
  Project offers REST APIs via SharePoint/Project Online, a Client-Side Object
  Model (CSOM), OData reporting feeds, and JavaScript APIs for building add-ins
  and integrations.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Budgeting
  - Gantt Charts
  - Microsoft
  - Portfolio Management
  - Project Management
  - Resource Management
  - Scheduling
  - Task Management
