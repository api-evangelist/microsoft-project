  - aid: microsoft-project:csom-api
    name: Microsoft Project Online CSOM API
    description: >-
      Client-Side Object Model API for programmatic access to Project Online and
      Project Server. Provides .NET, Silverlight, Windows Phone, and JavaScript
      interfaces for CRUD operations on projects, tasks, resources, assignments,
      custom fields, lookup tables, and enterprise project types.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://learn.microsoft.com/en-us/office/client-developer/project/client-side-object-model-csom-for-project-2013
    baseURL: https://{tenant}.sharepoint.com/sites/pwa/_api/ProjectServer
